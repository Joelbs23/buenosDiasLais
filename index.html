<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buenos Días Lais 💗🌅</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        .titulo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 45px;
            font-weight: bold;
            text-align: center;
            z-index: 10;
            text-shadow: 0 0 15px #fff, 0 0 30px #ff69b4, 0 0 50px #ff1493;
        }
    </style>
</head>
<body>

<div class="titulo">¡Buenos Días Lais 💗!</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let tiempo = 0;

    // --- 🐦 PAJARITOS CON MENSAJES Y EMOJIS ---
    const frasesPajaros = [
        "Eres maravillosa ✨💖",
        "Eres única 🌟🥰",
        "Eres especial 🌸💐",
        "Eres hermosa 🌹💫"
    ];

    class PajaroMensaje {
        constructor() {
            this.x = canvas.width + Math.random()*300;
            this.y = Math.random() * (canvas.height/2) + 70;
            this.vel = Math.random() * 1.8 + 1.2;
            this.texto = frasesPajaros[Math.floor(Math.random() * frasesPajaros.length)];
            this.tamano = Math.random() * 12 + 22;
        }
        update() {
            this.x -= this.vel;
            this.y += Math.sin(tiempo * 2 + this.x) * 0.3;
        }
        draw() {
            ctx.fillStyle = 'white';
            ctx.shadowColor = "#ff69b4";
            ctx.shadowBlur = 15;
            ctx.font = `bold ${this.tamano}px Arial`;
            ctx.fillText(this.texto, this.x, this.y);
            ctx.shadowBlur = 0;
        }
    }

    let pajaros = [];
    function crearPajaro() {
        pajaros.push(new PajaroMensaje());
        setTimeout(crearPajaro, 2800);
    }


    // --- 🌹 ROSAS EN EL JARDÍN ---
    const coloresRosa = ['#e91e63', '#ec407a', '#f48fb1', '#9c27b0', '#ba68c8', '#ad1457'];
    class Rosa {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.angulo = Math.random() * Math.PI * 2;
            this.color = coloresRosa[Math.floor(Math.random() * coloresRosa.length)];
            this.tam = Math.random() * 20 + 15;
        }
        dibujar(brillo) {
            this.angulo += 0.02;
            let movimiento = Math.sin(this.angulo) * 2;
            let altura = 110 * brillo;

            // Tallo verde
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x, this.y - altura);
            ctx.strokeStyle = '#2e7d32';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Hojas
            ctx.fillStyle = '#388e3c';
            ctx.beginPath();
            ctx.ellipse(this.x - 12, this.y - altura/2, 22, 8, -0.4, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(this.x + 10, this.y - altura/3, 20, 7, 0.4, 0, Math.PI*2);
            ctx.fill();

            // Pétalos de la rosa
            ctx.fillStyle = this.color;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 12;

            for(let i=0; i<8; i++) {
                let ang = (i * Math.PI / 4) + movimiento * 0.05;
                let px = this.x + Math.cos(ang) * this.tam;
                let py = this.y - altura + Math.sin(ang) * this.tam;
                ctx.beginPath();
                ctx.ellipse(px, py, this.tam/2, this.tam/3, ang, 0, Math.PI*2);
                ctx.fill();
            }

            // Centro de la rosa
            ctx.beginPath();
            ctx.arc(this.x, this.y - altura, this.tam/4, 0, Math.PI*2);
            ctx.fillStyle = '#ffeb3b';
            ctx.fill();

            ctx.shadowBlur = 0;
        }
    }

    let rosas = [];
    function crearJardin() {
        rosas = [];
        for(let i=0; i<22; i++) {
            let x = (canvas.width / 23) * (i+1) + Math.random()*35-15;
            let y = canvas.height - 50;
            rosas.push(new Rosa(x, y));
        }
    }


    // --- ESTRELLAS Y CIELO AMANECER ---
    let estrellas = [];
    for(let i=0; i<200; i++) {
        estrellas.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height * 0.6,
            r: Math.random() * 1.5
        });
    }


    // --- ANIMACIÓN PRINCIPAL ---
    function animar() {
        tiempo += 0.004;
        if(tiempo > 1) tiempo = 1;

        // Fondo amanecer
        let r = 20 + tiempo * (255 - 20);
        let g = 20 + tiempo * (180 - 20);
        let b = 60 + tiempo * (160 - 60);
        const gradiente = ctx.createLinearGradient(0,0,0,canvas.height);
        gradiente.addColorStop(0, `rgb(${r},${g},${b})`);
        gradiente.addColorStop(1, `rgb(255, ${160 + tiempo*60}, ${80 - tiempo*30})`);
        ctx.fillStyle = gradiente;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // Nubes
        ctx.fillStyle = `rgba(255,255,255,${0.3 + tiempo*0.4})`;
        ctx.beginPath(); ctx.arc(220 + Math.sin(tiempo)*25, 120, 55, 0, Math.PI*2); ctx.arc(270,110,65,0,Math.PI*2); ctx.arc(320,120,50,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(canvas.width-320 + Math.cos(tiempo)*20, 170, 45, 0, Math.PI*2); ctx.arc(canvas.width-270,160,55,0,Math.PI*2); ctx.fill();

        // Sol
        let solY = canvas.height - tiempo * (canvas.height * 0.6);
        ctx.shadowColor = "#ffdd00"; ctx.shadowBlur = 15 + tiempo * 35;
        ctx.fillStyle = "#ffed4e"; ctx.beginPath(); ctx.arc(canvas.width/2, solY, 75, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

        // Estrellas se apagan
        ctx.fillStyle = `rgba(255,255,255,${1 - tiempo})`;
        estrellas.forEach(e => {
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
        });

        // Rosas y suelo
        rosas.forEach(r => r.dibujar(tiempo));
        ctx.fillStyle = '#2e7d32';
        ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

        // Pajaritos volando
        pajaros.forEach((p, i) => {
            p.update();
            p.draw();
        });
        pajaros = pajaros.filter(p => p.x > -200);

        requestAnimationFrame(animar);
    }

    // Iniciar todo
    crearJardin();
    crearPajaro();
    animar();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        crearJardin();
    });

</script>

</body>
</html></body>
</html>
